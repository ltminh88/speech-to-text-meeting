# Centrifugo realtime server. Run with Podman: `podman compose up -d`
# (Docker-compatible; also runnable as a bare binary via `npm run centrifugo`.)
# Secrets from the shell/.env override the dev defaults baked into centrifugo/config.json.
services:
  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo:/centrifugo:ro,z
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_HMAC_SECRET:-change-me-long-random}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY:-change-me-api-key}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  realtime-server:
    build: ./services/realtime-server
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
      PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-change-me-api-key}
      TRANSCRIPT_MASTER_KEY: ${TRANSCRIPT_MASTER_KEY}
    depends_on:
      - centrifugo
